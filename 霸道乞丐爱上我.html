<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>霸道乞丐爱上我</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;500;700;900&family=Long+Cang&display=swap" rel="stylesheet">
<style>
  :root {
    --pink-soft: #ffd8e4;
    --pink-mid: #ff9ebd;
    --pink-hot: #ff4d87;
    --magenta: #c2185b;
    --gold: #e8c547;
    --cardboard: #c9a373;
    --cardboard-dark: #8b6b3d;
    --ink: #2a1a1f;
    --paper: #fdf6ec;
    --shadow: rgba(42, 26, 31, 0.35);
    --bg-current: linear-gradient(180deg, #ffc8d6 0%, #ffd8e4 50%, #ffe4ec 100%);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: "Noto Serif SC", serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }

  body {
    background: var(--bg-current);
    transition: background 1.2s ease;
    position: relative;
  }

  /* 颗粒噪点纹理 */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 25% 30%, rgba(255,255,255,0.3) 0%, transparent 50%),
      radial-gradient(circle at 75% 70%, rgba(255,77,135,0.15) 0%, transparent 50%);
    pointer-events: none;
    z-index: 1;
  }

  body::after {
    content: "";
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.35'/%3E%3C/svg%3E");
    opacity: 0.18;
    pointer-events: none;
    z-index: 2;
    mix-blend-mode: multiply;
  }

  /* 深色反转模式 */
  body.dark-mode {
    --bg-current: linear-gradient(180deg, #1a0e1a 0%, #2d0a1f 50%, #0f0515 100%);
  }
  body.dark-mode::before {
    background-image:
      radial-gradient(circle at 20% 20%, rgba(232,197,71,0.12) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(194,24,91,0.25) 0%, transparent 60%);
  }

  #game {
    position: relative;
    z-index: 10;
    height: 100vh;
    display: flex;
    flex-direction: column;
    max-width: 1000px;
    margin: 0 auto;
    padding: 24px 20px;
  }

  /* 顶部状态栏 */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 14px;
  }

  .title-logo {
    font-family: "ZCOOL KuaiLe", "Ma Shan Zheng", serif;
    font-size: 22px;
    color: var(--magenta);
    letter-spacing: 2px;
    text-shadow: 2px 2px 0 var(--pink-soft), 3px 3px 0 rgba(0,0,0,0.1);
    transition: color 0.6s;
  }
  body.dark-mode .title-logo { color: var(--gold); text-shadow: 2px 2px 0 #3a1025, 3px 3px 0 rgba(0,0,0,0.4); }

  .meter-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.5);
    border: 2px solid var(--magenta);
    border-radius: 20px;
    padding: 6px 14px;
    backdrop-filter: blur(4px);
    transition: all 0.6s;
  }
  body.dark-mode .meter-wrap { background: rgba(0,0,0,0.4); border-color: var(--gold); }

  .meter-label {
    font-family: "ZCOOL KuaiLe", serif;
    font-size: 13px;
    color: var(--magenta);
    white-space: nowrap;
  }
  body.dark-mode .meter-label { color: var(--gold); }

  .meter-bar {
    width: 120px;
    height: 10px;
    background: #fff;
    border: 1.5px solid var(--ink);
    border-radius: 5px;
    overflow: hidden;
    position: relative;
  }
  .meter-fill {
    height: 100%;
    width: 40%;
    background: linear-gradient(90deg, var(--pink-mid), var(--pink-hot));
    transition: width 0.6s cubic-bezier(.25,1.5,.5,1);
    position: relative;
  }
  .meter-fill::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.5) 50%, transparent 100%);
    animation: shine 2s infinite;
  }
  @keyframes shine {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(200%); }
  }

  /* 主舞台 */
  .stage {
    flex: 1;
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    border: 3px solid var(--ink);
    background: var(--bg-scene, linear-gradient(180deg, #87ceeb 0%, #b8d8e6 60%, #8b7355 100%));
    box-shadow: 0 10px 40px var(--shadow), inset 0 0 60px rgba(0,0,0,0.2);
    transition: background 1s;
  }

  /* 场景背景层 */
  .scene-bg {
    position: absolute;
    inset: 0;
    z-index: 1;
  }
  .scene-bg svg { width: 100%; height: 100%; display: block; }

  /* 人物立绘容器 */
  .character {
    position: absolute;
    bottom: 0;
    right: 5%;
    height: 85%;
    z-index: 2;
    transform: translateY(20px);
    opacity: 0;
    transition: transform 0.8s cubic-bezier(.25,1.2,.5,1), opacity 0.6s;
    filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
  }
  .character.active {
    transform: translateY(0);
    opacity: 1;
  }
  .character.shake {
    animation: shake 0.5s;
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px) rotate(-1deg); }
    40% { transform: translateX(8px) rotate(1deg); }
    60% { transform: translateX(-6px) rotate(-0.5deg); }
    80% { transform: translateX(6px) rotate(0.5deg); }
  }

  .character svg { height: 100%; width: auto; display: block; }

  /* 场景名牌 */
  .scene-tag {
    position: absolute;
    top: 16px;
    left: 16px;
    z-index: 3;
    background: rgba(42,26,31,0.85);
    color: var(--paper);
    font-family: "ZCOOL KuaiLe", serif;
    padding: 6px 14px;
    border-radius: 0 16px 0 16px;
    font-size: 14px;
    letter-spacing: 2px;
    border-left: 3px solid var(--pink-hot);
  }
  body.dark-mode .scene-tag { border-left-color: var(--gold); }

  /* 对话盒 */
  .dialog-box {
    position: absolute;
    left: 20px;
    right: 20px;
    bottom: 20px;
    z-index: 4;
    background: rgba(253, 246, 236, 0.96);
    border: 3px solid var(--ink);
    border-radius: 14px;
    padding: 18px 22px 22px;
    box-shadow: 0 6px 0 var(--ink), 0 6px 20px rgba(0,0,0,0.3);
    backdrop-filter: blur(8px);
    min-height: 140px;
    transition: background 0.6s, border-color 0.6s;
  }
  body.dark-mode .dialog-box {
    background: rgba(20, 10, 20, 0.92);
    border-color: var(--gold);
    box-shadow: 0 6px 0 var(--gold), 0 6px 20px rgba(0,0,0,0.5);
    color: var(--paper);
  }

  .speaker {
    display: inline-block;
    font-family: "ZCOOL KuaiLe", serif;
    font-size: 18px;
    color: var(--magenta);
    background: var(--pink-soft);
    padding: 4px 14px;
    border-radius: 20px;
    margin-bottom: 10px;
    border: 2px solid var(--magenta);
    transform: translateY(-30px);
    position: relative;
    top: -6px;
    box-shadow: 2px 2px 0 var(--ink);
  }
  body.dark-mode .speaker {
    color: var(--gold);
    background: #2d0a1f;
    border-color: var(--gold);
    box-shadow: 2px 2px 0 #000;
  }

  .dialog-text {
    font-size: 18px;
    line-height: 1.8;
    min-height: 60px;
    font-weight: 500;
  }
  .dialog-text .typed-cursor {
    display: inline-block;
    width: 3px;
    height: 1em;
    background: var(--magenta);
    vertical-align: text-bottom;
    animation: blink 0.8s steps(2) infinite;
    margin-left: 2px;
  }
  body.dark-mode .dialog-text .typed-cursor { background: var(--gold); }
  @keyframes blink { 50% { opacity: 0; } }

  .dialog-next {
    position: absolute;
    right: 20px;
    bottom: 16px;
    font-family: "ZCOOL KuaiLe", serif;
    font-size: 14px;
    color: var(--magenta);
    opacity: 0;
    transition: opacity 0.3s;
    animation: bobbing 1.2s ease-in-out infinite;
  }
  .dialog-next.show { opacity: 1; }
  body.dark-mode .dialog-next { color: var(--gold); }
  @keyframes bobbing {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
  }

  /* 选项按钮 */
  .choices {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    z-index: 5;
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: min(500px, 90%);
    padding: 20px;
    background: rgba(253, 246, 236, 0.95);
    border: 3px solid var(--ink);
    border-radius: 16px;
    box-shadow: 0 8px 0 var(--ink), 0 8px 30px rgba(0,0,0,0.4);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s;
  }
  .choices.show {
    opacity: 1;
    pointer-events: auto;
  }
  body.dark-mode .choices {
    background: rgba(20, 10, 20, 0.95);
    border-color: var(--gold);
    box-shadow: 0 8px 0 var(--gold), 0 8px 30px rgba(0,0,0,0.5);
  }

  .choices-title {
    font-family: "ZCOOL KuaiLe", serif;
    text-align: center;
    color: var(--magenta);
    font-size: 16px;
    margin-bottom: 4px;
    letter-spacing: 3px;
  }
  body.dark-mode .choices-title { color: var(--gold); }

  .choice-btn {
    background: #fff;
    color: var(--ink);
    border: 2.5px solid var(--ink);
    border-radius: 10px;
    padding: 14px 16px;
    font-family: "Noto Serif SC", serif;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
    box-shadow: 3px 3px 0 var(--ink);
    position: relative;
  }
  .choice-btn:hover {
    transform: translate(-2px, -2px);
    box-shadow: 5px 5px 0 var(--ink);
    background: var(--pink-soft);
  }
  .choice-btn:active {
    transform: translate(1px, 1px);
    box-shadow: 1px 1px 0 var(--ink);
  }
  body.dark-mode .choice-btn {
    background: #1a0a1a;
    color: var(--paper);
    border-color: var(--gold);
    box-shadow: 3px 3px 0 var(--gold);
  }
  body.dark-mode .choice-btn:hover { background: #3d1430; }

  .choice-btn::before {
    content: "❥";
    color: var(--pink-hot);
    margin-right: 8px;
    font-size: 14px;
  }
  body.dark-mode .choice-btn::before {
    content: "✦";
    color: var(--gold);
  }

  /* 浮动反馈提示 */
  .floater {
    position: absolute;
    z-index: 20;
    font-family: "ZCOOL KuaiLe", serif;
    font-size: 22px;
    font-weight: 700;
    pointer-events: none;
    animation: float-up 1.4s ease-out forwards;
  }
  .floater.up { color: #ff4d87; text-shadow: 0 0 10px #ffc8d6, 2px 2px 0 #fff; }
  .floater.down { color: #555; text-shadow: 0 0 8px #aaa, 2px 2px 0 #fff; }
  @keyframes float-up {
    0% { opacity: 0; transform: translateY(0) scale(0.6); }
    20% { opacity: 1; transform: translateY(-10px) scale(1.2); }
    100% { opacity: 0; transform: translateY(-80px) scale(1); }
  }

  /* 开场/结局覆盖层 */
  .overlay {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    background: linear-gradient(135deg, #ffd0e0 0%, #ffb3d9 50%, #ff80b3 100%);
    transition: opacity 0.8s, transform 0.8s;
  }
  .overlay.dark {
    background: radial-gradient(ellipse at center, #3d0a2a 0%, #0f0515 70%, #000 100%);
  }
  .overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .overlay h1 {
    font-family: "ZCOOL KuaiLe", serif;
    font-size: clamp(40px, 8vw, 72px);
    color: var(--magenta);
    text-shadow:
      3px 3px 0 #fff,
      6px 6px 0 var(--ink),
      8px 8px 20px rgba(0,0,0,0.4);
    letter-spacing: 6px;
    margin-bottom: 16px;
    animation: title-in 1.2s ease-out;
  }
  .overlay.dark h1 {
    color: var(--gold);
    text-shadow:
      3px 3px 0 #000,
      6px 6px 0 var(--magenta),
      0 0 30px rgba(232, 197, 71, 0.5);
  }
  @keyframes title-in {
    0% { opacity: 0; transform: translateY(-30px) scale(0.8); letter-spacing: 20px; }
    100% { opacity: 1; transform: translateY(0) scale(1); letter-spacing: 6px; }
  }

  .overlay .subtitle {
    font-family: "Long Cang", "Ma Shan Zheng", serif;
    font-size: 22px;
    color: var(--ink);
    margin-bottom: 40px;
    opacity: 0.85;
    text-align: center;
    max-width: 80%;
    line-height: 1.8;
  }
  .overlay.dark .subtitle { color: var(--pink-soft); }

  .overlay .ending-body {
    font-family: "Noto Serif SC", serif;
    font-size: 17px;
    line-height: 2;
    max-width: 560px;
    text-align: center;
    margin: 0 auto 32px;
    color: var(--ink);
    padding: 0 20px;
  }
  .overlay.dark .ending-body { color: #f5e0d0; }

  .start-btn {
    font-family: "ZCOOL KuaiLe", serif;
    font-size: 22px;
    padding: 16px 48px;
    border: 3px solid var(--ink);
    background: #fff;
    color: var(--magenta);
    border-radius: 30px;
    cursor: pointer;
    letter-spacing: 6px;
    box-shadow: 4px 4px 0 var(--ink), 0 0 40px rgba(255,77,135,0.5);
    transition: all 0.2s;
    animation: pulse 2s infinite;
  }
  .start-btn:hover {
    transform: translate(-2px, -2px);
    box-shadow: 6px 6px 0 var(--ink), 0 0 60px rgba(255,77,135,0.7);
  }
  .overlay.dark .start-btn {
    background: #1a0515;
    color: var(--gold);
    border-color: var(--gold);
    box-shadow: 4px 4px 0 var(--gold), 0 0 40px rgba(232, 197, 71, 0.4);
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.03); }
  }

  .sparkle {
    position: absolute;
    color: #fff;
    font-size: 24px;
    pointer-events: none;
    animation: sparkle-in 2s infinite;
  }
  @keyframes sparkle-in {
    0%, 100% { opacity: 0; transform: scale(0.5) rotate(0deg); }
    50% { opacity: 1; transform: scale(1.2) rotate(180deg); }
  }

  /* 反转闪屏 */
  .flash {
    position: fixed;
    inset: 0;
    z-index: 99;
    background: #fff;
    pointer-events: none;
    opacity: 0;
  }
  .flash.trigger { animation: flash-anim 1.5s ease-out; }
  @keyframes flash-anim {
    0% { opacity: 0; background: #fff; }
    10% { opacity: 1; background: #fff; }
    30% { opacity: 0.3; background: #ff4d87; }
    60% { opacity: 0.8; background: #000; }
    100% { opacity: 0; background: #000; }
  }

  /* 屏幕底部按钮 */
  .sound-toggle {
    background: rgba(255,255,255,0.6);
    border: 2px solid var(--magenta);
    border-radius: 50%;
    width: 36px;
    height: 36px;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .sound-toggle:hover { transform: scale(1.1); }
  body.dark-mode .sound-toggle { background: rgba(0,0,0,0.5); border-color: var(--gold); color: var(--gold); }

  /* 移动端 */
  @media (max-width: 640px) {
    #game { padding: 12px 10px; }
    .title-logo { font-size: 16px; letter-spacing: 1px; }
    .meter-bar { width: 80px; }
    .meter-label { font-size: 11px; }
    .dialog-text { font-size: 15px; }
    .speaker { font-size: 15px; }
    .choice-btn { font-size: 14px; padding: 12px 14px; }
    .overlay h1 { letter-spacing: 3px; }
    .scene-tag { font-size: 11px; }
    .character { right: 2%; height: 70%; }
  }
</style>
</head>
<body>

<div class="flash" id="flash"></div>

<!-- 开场覆盖层 -->
<div class="overlay" id="startOverlay">
  <div class="sparkle" style="top: 20%; left: 15%;">✦</div>
  <div class="sparkle" style="top: 30%; right: 20%; animation-delay: 0.5s;">✧</div>
  <div class="sparkle" style="bottom: 25%; left: 25%; animation-delay: 1s;">❀</div>
  <div class="sparkle" style="bottom: 35%; right: 15%; animation-delay: 1.5s;">✦</div>
  <h1>霸道乞丐爱上我</h1>
  <div class="subtitle">
    ——一个关于桥洞、纸板、和命运的故事——<br>
    <span style="font-size: 15px; opacity: 0.7;">（慎入，含甜宠与黑化双重暴击）</span>
  </div>
  <button class="start-btn" id="startBtn">点 击 开 始</button>
</div>

<!-- 结局覆盖层 -->
<div class="overlay hidden" id="endingOverlay">
  <h1 id="endingTitle"></h1>
  <div class="subtitle" id="endingSubtitle"></div>
  <div class="ending-body" id="endingBody"></div>
  <button class="start-btn" id="restartBtn">再 来 一 次</button>
</div>

<div id="game">
  <div class="topbar">
    <div class="title-logo">霸道乞丐爱上我</div>
    <div class="meter-wrap">
      <span class="meter-label">❤ 沦陷度</span>
      <div class="meter-bar"><div class="meter-fill" id="meterFill"></div></div>
      <button class="sound-toggle" id="muteBtn" title="静音">🔔</button>
    </div>
  </div>

  <div class="stage" id="stage">
    <div class="scene-bg" id="sceneBg"></div>
    <div class="scene-tag" id="sceneTag">第一幕・雨夜初遇</div>
    <div class="character" id="character"></div>

    <div class="dialog-box" id="dialogBox">
      <div class="speaker" id="speaker">???</div>
      <div class="dialog-text" id="dialogText"></div>
      <div class="dialog-next" id="dialogNext">点击继续 ▶</div>
    </div>

    <div class="choices" id="choices">
      <div class="choices-title">❀ 你要怎么回应？ ❀</div>
    </div>
  </div>
</div>

<!-- 背景音效（可选，用 WebAudio 生成） -->
<script>
/* =========================================================================
   人物立绘 SVG（动漫风，可替换）
   ========================================================================= */
const CHARACTERS = {
  // 男主：破衣烂衫但帅气
  male_normal: `
<svg viewBox="0 0 300 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hairGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="60%" stop-color="#2d2d4a"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <linearGradient id="skinGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fde5d0"/>
      <stop offset="100%" stop-color="#e8c8a8"/>
    </linearGradient>
    <linearGradient id="clothGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a3828"/>
      <stop offset="100%" stop-color="#2b1f15"/>
    </linearGradient>
    <linearGradient id="scarfGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b0000"/>
      <stop offset="100%" stop-color="#4d0000"/>
    </linearGradient>
    <pattern id="patch" x="0" y="0" width="14" height="14" patternUnits="userSpaceOnUse">
      <rect width="14" height="14" fill="#4a3828"/>
      <path d="M0 7 L14 7 M7 0 L7 14" stroke="#2b1f15" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- 身体阴影 -->
  <ellipse cx="150" cy="490" rx="90" ry="8" fill="rgba(0,0,0,0.2)"/>

  <!-- 脖子 -->
  <path d="M130 230 Q130 250 135 270 L165 270 Q170 250 170 230 Z" fill="url(#skinGrad)"/>
  <path d="M130 245 Q150 255 170 245" stroke="#c89a7a" stroke-width="1" fill="none" opacity="0.6"/>

  <!-- 肩膀和上衣（破烂） -->
  <path d="M80 290 Q75 330 70 380 L70 500 L230 500 L230 380 Q225 330 220 290
           Q210 260 180 255 L120 255 Q90 260 80 290 Z" fill="url(#clothGrad)"/>

  <!-- 补丁 -->
  <path d="M95 340 L125 335 L130 370 L100 375 Z" fill="url(#patch)" opacity="0.9" stroke="#1a1208" stroke-width="1.5" stroke-dasharray="3,2"/>
  <path d="M170 380 L205 378 L208 410 L175 413 Z" fill="#6b4423" opacity="0.85" stroke="#1a1208" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- 破洞 -->
  <path d="M140 400 L155 398 L158 415 L142 418 Z" fill="#1a0a08"/>

/* =========================================================================
   游戏状态
   ========================================================================= */
const state = {
  index: 0,
  dialogIndex: 0,
  affection: 40,
  typing: false,
  currentScene: null,
  muted: false,
  flags: {}
};

// 音效：用 WebAudio 生成简单音
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
  }
  return audioCtx;
}
function beep(freq = 800, duration = 0.04, type = "sine", vol = 0.05) {
  if (state.muted) return;
  const ctx = ensureAudio();
  if (!ctx) return;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + duration);
}
function chord(freqs, duration = 0.3) {
  if (state.muted) return;
  freqs.forEach(f => beep(f, duration, "triangle", 0.03));
}

/* =========================================================================
   DOM 操作
   ========================================================================= */
const $ = id => document.getElementById(id);

function setBackground(bgKey) {
  $("sceneBg").innerHTML = BACKGROUNDS[bgKey] || "";
}
function setCharacter(charKey) {
  const el = $("character");
  el.classList.remove("active");
  setTimeout(() => {
    el.innerHTML = CHARACTERS[charKey] || "";
    requestAnimationFrame(() => el.classList.add("active"));
  }, 200);
}
function setSceneTag(tag) {
  $("sceneTag").textContent = tag;
}
function updateMeter() {
  const pct = Math.max(0, Math.min(100, state.affection));
  $("meterFill").style.width = pct + "%";
}
function showFloater(text, type) {
  const f = document.createElement("div");
  f.className = "floater " + type;
  f.textContent = text;
  const stage = $("stage");
  const rect = stage.getBoundingClientRect();
  f.style.left = (rect.width / 2 - 30) + "px";
  f.style.top = "40%";
  stage.appendChild(f);
  setTimeout(() => f.remove(), 1400);
}

/* =========================================================================
   文字逐字显示
   ========================================================================= */
function typeText(el, text, cb) {
  state.typing = true;
  el.innerHTML = "";
  const cursor = document.createElement("span");
  cursor.className = "typed-cursor";
  el.appendChild(cursor);
  let i = 0;
  const speed = 35;
  function step() {
    if (i >= text.length) {
      state.typing = false;
      cb && cb();
      return;
    }
    const ch = text[i];
    cursor.insertAdjacentText("beforebegin", ch);
    if (ch !== "，" && ch !== "。" && ch !== " " && ch !== "—" && ch !== "（" && ch !== "）" && i % 2 === 0) {
      beep(900 + Math.random() * 200, 0.02, "square", 0.02);
    }
    i++;
    setTimeout(step, ch === "。" ? speed * 4 : ch === "，" ? speed * 2 : speed);
  }
  step();
}

function fastFinish() {
  if (!state.typing) return false;
  state.typing = false;
  return true;
}

/* =========================================================================
   场景推进逻辑
   ========================================================================= */
function findScene(id) {
  return SCENES.find(s => s.id === id);
}

function enterScene(sceneOrIndex) {
  let scene;
  if (typeof sceneOrIndex === "number") {
    scene = SCENES[sceneOrIndex];
    state.index = sceneOrIndex;
  } else {
    scene = sceneOrIndex;
  }
  state.currentScene = scene;
  state.dialogIndex = 0;

  if (scene.preEffect === "flash") {
    const flash = $("flash");
    flash.classList.remove("trigger");
    void flash.offsetWidth;
    flash.classList.add("trigger");
    chord([150, 100, 80], 1.2);
  }
  if (scene.onEnter === "darkMode") {
    setTimeout(() => document.body.classList.add("dark-mode"), 800);
  }

  setTimeout(() => {
    setSceneTag(scene.tag);
    setBackground(scene.bg);
    setCharacter(scene.char);
    playDialog();
  }, scene.preEffect === "flash" ? 900 : 0);
}

function playDialog() {
  const scene = state.currentScene;
  const d = scene.dialogs[state.dialogIndex];
  if (!d) {
    // 对话完毕
    if (scene.choices) {
      showChoices(scene.choices);
    } else if (scene.autoNext !== undefined) {
      // 过渡到下一场景
      setTimeout(() => enterScene(scene.autoNext), 600);
    }
    return;
  }
  $("speaker").textContent = d.speaker;
  $("dialogNext").classList.remove("show");
  typeText($("dialogText"), d.text, () => {
    $("dialogNext").classList.add("show");
  });
}

function advanceDialog() {
  if (fastFinish()) {
    // 若正在打字，直接显示完成
    const scene = state.currentScene;
    const d = scene.dialogs[state.dialogIndex];
    $("dialogText").innerHTML = d.text + '<span class="typed-cursor"></span>';
    $("dialogNext").classList.add("show");
    return;
  }
  const scene = state.currentScene;
  state.dialogIndex++;
  if (state.dialogIndex >= scene.dialogs.length) {
    if (scene.choices) {
      showChoices(scene.choices);
    } else if (scene.autoNext !== undefined) {
      setTimeout(() => enterScene(scene.autoNext), 300);
    } else {
      // 查找对应 ending
      const endingKey = scene.endingKey;
      if (endingKey) showEnding(endingKey);
    }
    return;
  }
  playDialog();
}

function showChoices(choices) {
  const box = $("choices");
  box.innerHTML = '<div class="choices-title">❀ 你要怎么回应？ ❀</div>';
  choices.forEach(c => {
    const btn = document.createElement("button");
    btn.className = "choice-btn";
    btn.textContent = c.text;
    btn.onclick = () => pickChoice(c);
    box.appendChild(btn);
  });
  box.classList.add("show");
  chord([500, 700, 900], 0.25);
}

function pickChoice(choice) {
  $("choices").classList.remove("show");
  // 更新好感度
  if (choice.delta) {
    state.affection += choice.delta * 7;
    state.affection = Math.max(0, Math.min(100, state.affection));
    showFloater(
      (choice.delta > 0 ? "沦陷度 +" : "沦陷度 ") + (choice.delta * 7),
      choice.delta > 0 ? "up" : "down"
    );
    beep(choice.delta > 0 ? 1200 : 300, 0.15, "sine", 0.05);
    updateMeter();
  }
  if (choice.flag) state.flags[choice.flag] = true;
  // 跳转
  const targetId = choice.next;
  if (ENDINGS[targetId]) {
    setTimeout(() => showEnding(targetId), 600);
    return;
  }
  const nextScene = findScene(targetId);
  if (nextScene) {
    setTimeout(() => enterScene(nextScene), 500);
  } else {
    // 按索引前进
    setTimeout(() => enterScene(state.index + 1), 500);
  }
}

function showEnding(key) {
  const ending = ENDINGS[key];
  if (!ending) return;
  const overlay = $("endingOverlay");
  overlay.classList.remove("hidden");
  if (ending.dark) overlay.classList.add("dark");
  $("endingTitle").textContent = ending.title;
  $("endingSubtitle").textContent = ending.subtitle;
  $("endingBody").innerHTML = ending.body;
  chord([220, 330, 440], 1.5);
}

/* =========================================================================
   启动
   ========================================================================= */
function startGame() {
  // 恢复音频上下文
  ensureAudio();
  if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();

  $("startOverlay").classList.add("hidden");
  document.body.classList.remove("dark-mode");
  state.affection = 40;
  state.flags = {};
  updateMeter();
  enterScene(0);
}

function restartGame() {
  $("endingOverlay").classList.add("hidden");
  $("endingOverlay").classList.remove("dark");
  document.body.classList.remove("dark-mode");
  state.affection = 40;
  state.flags = {};
  state.index = 0;
  updateMeter();
  enterScene(0);
}

/* 事件绑定 */
$("startBtn").addEventListener("click", startGame);
$("restartBtn").addEventListener("click", restartGame);

// 点击对话框推进
$("dialogBox").addEventListener("click", () => {
  if ($("choices").classList.contains("show")) return;
  advanceDialog();
});
// 空格 / Enter 推进
document.addEventListener("keydown", (e) => {
  if (e.code === "Space" || e.code === "Enter") {
    if ($("startOverlay").classList.contains("hidden") &&
        $("endingOverlay").classList.contains("hidden") &&
        !$("choices").classList.contains("show")) {
      e.preventDefault();
      advanceDialog();
    }
  }
});

// 静音切换
$("muteBtn").addEventListener("click", (e) => {
  e.stopPropagation();
  state.muted = !state.muted;
  $("muteBtn").textContent = state.muted ? "🔕" : "🔔";
});

// 初始化
updateMeter();

</script>
</body>
</html>
